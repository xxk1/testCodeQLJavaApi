swagger: "2.0"
info:
  title: "CourseApi-Api文档"
  version: "1.0.0"
  description: "获取课程信息的接口文档"
host: "192.168.1.34:8080"
basePath: "/v1"
schemes:
  - "http"
paths:
  "/coursetype":
    get:
      tags:
        - "CourseType"
      summary: "获取课程分类"
      description: "1.云课堂管理端随堂评教统计获取课程分类"
      parameters:
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: OK
          schema:
            type: "array"
            items:
              $ref: "#/definitions/CourseTypeResource"
        
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        404:
          description: "未找到评教活动"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"     
definitions:

  ErrorResult:
    type: "object"
    properties:
      code:
        type: "string"
        description: "错误码"
      message:
        type: "string"
        description: "错误信息"

  CourseTypeResource:
    type: "object"
    properties:
      id:
        type: string
        description: "课程分类id"
      courseTypeName:
        type: string
        description: "课程分类名称"
      imagePath:
        type: string
        description: "缩略图路径"
      sort:
        type: integer
        description: "排序"
      


