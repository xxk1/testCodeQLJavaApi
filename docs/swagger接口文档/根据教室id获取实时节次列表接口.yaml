swagger: "2.0"
info:
  title: "CourseApi-Api文档"
  version: "1.0.0"
  description: "获取课程信息的接口文档"
host: "192.168.1.34:8080"
basePath: "/v1"
schemes:
  - "http"
paths:
  "/roomrealtimesegment":
    get:
      tags:
        - "CourseTableResource"
      summary: "根据教室id获取实时节次列表"
      description: "使用方：1、AI课堂助教"
      operationId: "getRealtimeSegmentsByRoomId"
      parameters:
        - name: "roomId"
          in: "query"
          description: "教室id"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "加密验证码roomId={xxx}&signKey=123123"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: array
            items:
              $ref: "#/definitions/RealtimeSegment"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

definitions:
  ErrorResult:
    type: "object"
    properties:
      code:
        type: "string"
        description: "错误码"
      message:
        type: "string"
        description: "错误信息"

  RealtimeSegment:
    type: "object"
    properties:
      courseTableDetailId:
        type: "string"
        description: "课表明细id"
      courseSegmentId:
        type: "string"
        description: "课表节次id"
      startTime:
        type: "string"
        description: "开始时间（HH:mm）"
      endTime:
        type: "string"
        description: "结束时间（HH:mm）"