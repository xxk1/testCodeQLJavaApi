swagger: "2.0"
info:
  description: "项目管理相关接口"
  version: "1.0.0"
  title: "courseApi文档"
host: "192.168.1.105:8080"
basePath: "/courseApi/v1"
schemes:
  - "http"
paths:
  /projects/projecttypes:
    get:
      tags:
        - "projects"
      summary: "接口-获取项目种类"
      description: "1、云课堂管理端项目管理使用"
      parameters:
        - name: "validCode"
          in: "query"
          description: "验证码&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/ProjectTypeVo"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"

  /projects/projectcategories:
    get:
      tags:
        - "projects"
      summary: "接口-获取项目类别"
      description: "1、云课堂管理端项目管理使用"
      parameters:
        - name: "validCode"
          in: "query"
          description: "验证码&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/ProjectCategoryVo"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"

  /projects/projectclaims:
    get:
      tags:
        - "projects"
      summary: "接口-获取项目要求"
      description: "1、云课堂管理端项目管理使用"
      parameters:
        - name: "validCode"
          in: "query"
          description: "验证码&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/ProjectClaimVo"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"

  /projects/projectgenres:
    get:
      tags:
        - "projects"
      summary: "接口-获取项目类型"
      description: "1、云课堂管理端项目管理使用"
      parameters:
        - name: "validCode"
          in: "query"
          description: "验证码&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/ProjectGenreVo"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"

  /projects/pagelist:
    post:
      tags:
        - "projects"
      summary: "接口-项目信息列表"
      description: "1、云课堂管理端项目管理使用"
      parameters:
        - name: "validCode"
          in: "query"
          description: "验证码&signKey=123123(md5加密)"
          type: "string"
          required: true
        - name: "projectQueryParam"
          in: 'body'
          required: true
          description: "项目信息列表查询条件"
          schema:
            $ref: '#/definitions/ProjectQueryParam'
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/ProjectPageResource"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"

  /projects/deletelist:
    post:
      tags:
        - "projects"
      summary: "接口-项目批量删除"
      description: "1、云课堂管理端项目管理使用"
      parameters:
        - name: "validCode"
          in: "query"
          description: "验证码&signKey=123123(md5加密)"
          type: "string"
          required: true
        - name: "projectDeleteParam"
          in: 'body'
          required: true
          description: "项目信息列表查询条件"
          schema:
            $ref: '#/definitions/ProjectDeleteParam'
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/ProjectPageResource"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"
  /projects:
    post:
      tags:
        - "projects"
      summary: "接口-新增项目"
      description: "1、云课堂管理端项目管理使用；2、teachingApi新增实验报告时调用"
      parameters:
        - name: "validCode"
          in: "query"
          description: "验证码&signKey=123123(md5加密)"
          type: "string"
          required: true
        - name: "projectInfoResource"
          in: "body"
          required: true
          description: "新增项目信息"
          schema:
            $ref: '#/definitions/ProjectInfoResource'
      responses:
        200:
          description: "成功"
          schema:
            $ref: '#/definitions/ProjectResource'
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  /projects/{id}:
    post:
      tags:
        - "projects"
      summary: "接口-修改项目"
      description: "1、云课堂管理端项目管理使用"
      parameters:
        - name: "validCode"
          in: "query"
          description: "验证码id=?&signKey=123123(md5加密)"
          type: "string"
          required: true
        - name: "id"
          in: "path"
          description: "项目id"
          type: "string"
          required: true
        - name: "projectInfoResource"
          in: "body"
          required: true
          description: "修改项目信息"
          schema:
            $ref: '#/definitions/ProjectInfoResource'
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        404:
          description: "未找到项目信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  /course/project:
    get:
      tags:
        - "Project"
      summary: "获取课程下的项目接口"
      description: "1.云课堂老师端-项目量表配置使用"
      operationId: getCourseProjectList
      parameters:
        - name: "validCode"
          in: "query"
          description: "验证码&signKey=123123(md5加密)"
          type: "string"
          required: true
        - name: "courseIds"
          in: query
          description: "课程ids"
          type: string
          required: true
        - name: "projectName"
          type: string
          description: "项目名称"
          required: false
          in: query
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/ProjectResource"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"

  /project/{id}/standardduration:
    post:
      tags:
        - "Project"
      summary: "修改项目标准时长接口"
      description: "1.云课堂教师端-项目配置管理使用"
      operationId: updateProjectStandardDuration
      parameters:
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：id={}&signKey=123123(md5加密)"
          required: true
        - name: "id"
          type: string
          description: "项目id"
          in: path
          required: true
        - name: "standardDuration"
          type: number
          description: "项目标准时长 单位：h"
          required: true
          in: query
        - name: "modifierId"
          type: string
          description: "修改人id"
          required: false
          in: query
        - name: "modifierName"
          type: string
          description: "修改人姓名"
          required: false
          in: query
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务校验错误信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

definitions:
  ErrorResult:
    type: object
    properties:
      code:
        type: "string"
        description: "错误码"
      error:
        type: "string"
        description: "错误信息"

  ProjectTypeVo:
    type: object
    properties:
      value:
        type: "integer"
        description: "项目种类值"
      projectTypeName:
        type: "string"
        description: "项目种类名称"

  ProjectCategoryVo:
    type: object
    properties:
      value:
        type: "integer"
        description: "项目类别值"
      projectCategoryName:
        type: "string"
        description: "项目类别名称"

  ProjectClaimVo:
    type: object
    properties:
      value:
        type: "integer"
        description: "项目要求值"
      projectClaimName:
        type: "string"
        description: "项目要求名称"

  ProjectGenreVo:
    type: object
    properties:
      value:
        type: "integer"
        description: "项目类型值"
      projectGenreName:
        type: "string"
        description: "项目类型名称"

  ProjectQueryParam:
    type: object
    properties:
      page:
        type: "integer"
        description: "当前页码"
      pageSize:
        type: "integer"
        description: "每页记录数"
      projectName:
        type: "string"
        description: "项目名称"
      projectTypeValue:
        type: "integer"
        description: "项目种类值"
      courseId:
        type: "string"
        description: "所属课程id"
      projectClassificationId:
        type: "string"
        description: "项目分类id"
  ProjectDeleteParam:
    type: object
    properties:
      projectIdList:
        type: "array"
        description: "项目id列表"
        items:
          type: "string"
  ProjectPageResource:
    type: "object"
    properties:
      page:
        type: "integer"
        description: "当前页码"
      pageSize:
        type: "integer"
        description: "每页记录数"
      pageCount:
        type: "integer"
        description: "总页数"
      totalCount:
        type: "integer"
        description: "总条数"
      projectList:
        type: "array"
        description: "项目信息列表"
        items:
          $ref: "#/definitions/ProjectResource"

  ProjectResource:
    type: object
    properties:
      id:
        type: "string"
        description: "项目id"
      classificationId:
        type: "string"
        description: "项目分类id"
      classificationName:
        type: "string"
        description: "项目分类名称"
      projectCode:
        type: "string"
        description: "项目编号"
      projectName:
        type: "string"
        description: "项目名称"
      projectDescription:
        type: "string"
        description: "项目内容"
      courseId:
        type: "string"
        description: "课程id"
      courseName:
        type: "string"
        description: "课程名称"
      courseCode:
        type: "string"
        description: "课程编号"
      standardDuration:
        type: number
        description: "项目标准时长 生成之后改为Double"
      projectTypeValue:
        type: "integer"
        description: "项目种类值"
      projectTypeName:
        type: "string"
        description: "项目种类名称"
      projectClaimValue:
        type: "integer"
        description: "项目要求值"
      projectClaimName:
        type: "string"
        description: "项目要求名称"
      projectGenreValue:
        type: "integer"
        description: "项目类型值"
      projectGenreName:
        type: "string"
        description: "项目类型名称"
      projectCategoryValue:
        type: "integer"
        description: "项目类别值"
      projectCategoryName:
        type: "string"
        description: "项目类别名称"
      whetherAssociateCoursesValue:
        type: "integer"
        description: "是否关联课程值(0:否，1:是)"
      whetherAssociateCoursesName:
        type: "string"
        description: "是否关联课程名称(0:否，1:是)"

  ProjectInfoResource:
    type: object
    properties:
      userId:
        type: "string"
        description: "用户id"
      userName:
        type: "string"
        description: "用户姓名"
      projectCode:
        type: "string"
        description: "项目编号"
      projectName:
        type: "string"
        description: "项目名称"
      courseId:
        type: "string"
        description: "课程id"
      courseName:
        type: "string"
        description: "课程名称"
      courseCode:
        type: "string"
        description: "课程编号"
      projectTypeValue:
        type: "integer"
        description: "项目种类值"
      projectCategoryValue:
        type: "integer"
        description: "项目类别值"
      projectGenreValue:
        type: "integer"
        description: "项目类型值"
      projectClaimValue:
        type: "integer"
        description: "项目要求值"
      classificationId:
        type: "string"
        description: "项目分类id"
      classificationName:
        type: "string"
        description: "项目分类名称"
      projectDescription:
        type: "string"
        description: "项目内容"
      whetherAssociateCourses:
        type: "integer"
        description: "是否关联课程(0:否，1:是)"