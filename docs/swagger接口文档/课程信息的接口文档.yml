swagger: "2.0"
info:
  title: "CourseApi-Api文档"
  version: "1.0.0"
  description: "获取课程信息的接口文档"
host: "192.168.1.34:8080"
basePath: "/v1"
schemes:
  - "http"
paths:
  "/coursetables":
    get:
      tags:
        - "CourseTableResource"
      summary: "根据课程id，老师Id和学期查询课表信息"
      description: "云课堂前端使用"
      produces:
        - "application/json"
      parameters:
        - name: "courseIds"
          type: "string"
          in: "query"
          description: "课程ID,多个用“,”隔开"
          required: true
        - name: "teacherId"
          type: "string"
          in: "query"
          description: "老师Id"
          required: true
        - name: "schoolYear"
          type: "string"
          in: "query"
          description: "学年"
          required: true
        - name: "term"
          type: "integer"
          in: "query"
          description: "学期"
          required: true
        - name: "validCode"
          in: "query"
          description: "加密验证码courseIds=?&signKey=123123"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: array
            items:
              $ref: "#/definitions/CourseResource"
        401:
          description: "解密验证失败"
        404:
          description: "未找到课表信息"
        400:
          description: "参数不正确"
        500:
          description: "服务器异常"

  '/CourseResources':
    get:
      tags:
        - 'CourseResources'
      summary: '查询课程信息'
      description: ''
      operationId: "getCourseResourcePage"
      parameters:
        - in: 'query'
          name: 'validCode'
          required: true
          type: string
          description: 'MD5加密验证字符串'
        - in: 'query'
          name: 'collegeId'
          type: string
          description: '学院Id'
          required: false
        - in: 'query'
          name: 'courseName'
          type: string
          description: '课程名称'
          required: false
        - in: 'query'
          name: 'page'
          type: 'integer'
          required: true
          description: '当前页'
        - in: 'query'
          name: 'pageSize'
          type: 'integer'
          description: '每页个数'
          required: true
        - in: query
          name: courseSource
          type: integer
          description: "课程来源 0：数据对接；1：课程管理老师新建"
          required: false
      responses: # 响应体定制,如果没有返回值可以使用defalut指定默认项目
        200: # 在200 情况下的返回值和注释
          description: "操作成功"
          schema:
            $ref: "#/definitions/CourseResourcesPageVo"
        400:
          description: "参数异常"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  /courseresources/courseinforesources:
    get:
      tags:
        - 'CourseResources'
      summary: '根据课程名称查询课程信息'
      description: '云课堂管理端使用'
      parameters:
        - in: 'query'
          name: 'validCode'
          required: true
          type: string
          description: 'MD5加密验证字符串（&signKey=123123）'
        - in: 'query'
          name: 'courseName'
          type: string
          description: '课程名称'
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/CourseInfoResource"
        '400':
          description: 参数异常，接受传入的参数类型不正确、必填参数未填写
        '403':
          description: 传入的加密参数未通过验证
        '404':
          description: 资源路径参数对应的资源未找到
        '500':
          description: 文件操作IO异常等

  /teachers/currentcoursetables:
    get:
      tags:
        - "teachers"
      summary: "接口-获取老师当前时间的课表简项信息"
      description: "互动课堂使用"
      produces:
        - "application/json"
      parameters:
        - name: "teacherId"
          type: "string"
          in: "query"
          description: "老师id"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：teacherId=?&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/CourseTableSimpleVo"
        400:
          description: "错误的请求"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "当前时间不存在课表"
        500:
          description: "服务器异常"

  /courseTables/studentCourseList:
    get:
      tags:
        - "CourseStudentResource"
      summary: "获取学生课程信息"
      description: "云课堂调用"
      produces:
        - "application/json"
      parameters:
        - name: "userId"
          in: "query"
          description: "学生Id"
          type: "string"
          required: false
        - name: "openId"
          in: "query"
          description: "openId"
          type: "string"
          required: false
        - name: "term"
          in: "query"
          description: "学期"
          type: "integer"
          required: true
        - name: "schoolYear"
          in: "query"
          description: "学年"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码（userId=?&signKey=123123）"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/CourseStudentResource"
        400:
          description: "参数不正确"
        404:
          description: "未找到学生课程信息"
        403:
          description: "解密错误"
        500:
          description: "服务器异常"

  /courseteacher/{userId}:
    get:
      tags:
        - "CourseTeacher"
      summary: "查询上课老师课程信息"
      description: "云课堂调用"
      produces:
        - "application/json"
      parameters:
        - name: "userId"
          in: "path"
          description: "老师Id"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码（userId=?&signKey=123123）"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/CourseTeacher"
        400:
          description: "参数不正确"
        404:
          description: "未找到上课老师课程信息"
        403:
          description: "解密错误"
        500:
          description: "服务器异常"

  /coursetabledetails/{id}:
    get:
      tags:
        - "CourseTableDetails"
      summary: "通过课表明细id获取课表信息"
      description: "1、互动课堂内部使用；2、督导听课提交内部使用"
      produces:
        - "application/json"
      parameters:
        - name: "id"
          type: "string"
          in: "path"
          description: "课表明细id"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：id=?&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/CourseTableInfo"
        400:
          description: "客户端错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到课表明细的课表信息"
        500:
          description: "服务器异常"

  "/coursetablesdayorweek":
    post:
      tags:
        - "CourseTableResource"
      summary: "获取课表信息（日课表，周课表公用）"
      description: "小程序调用"
      operationId: "getCourseTablesDayOrWeek"
      parameters:
        - name: "validCode"
          in: "query"
          description: "加密验证码&signKey=123123"
          type: "string"
          required: true
        - in: "body"
          name: "courseparms"
          description: "查询课表条件集合"
          required: true
          schema:
            $ref: "#/definitions/CourseParms"
      responses:
        200:
          description: "成功"
          schema:
            type: array
            items:
              $ref: "#/definitions/CourseTableDate"
        404:
          description: "未找到日期信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/teacher/coursetablesdayorweek":
    post:
      tags:
        - "CourseTableResource"
      summary: "获取教师课表信息（日课表，周课表公用）"
      description: "小程序调用"
      operationId: "getTeacherCourseTablesDayOrWeek"
      parameters:
        - name: "validCode"
          in: "query"
          description: "加密验证码&signKey=123123"
          type: "string"
          required: true
        - in: "body"
          name: "courseparms"
          description: "查询课表条件集合"
          required: true
          schema:
            $ref: "#/definitions/CourseParms"
      responses:
        200:
          description: "成功"
          schema:
            type: array
            items:
              $ref: "#/definitions/CourseTableDate"
        404:
          description: "未找到日期信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/student/coursetablesdayorweek":
    post:
      tags:
        - "CourseTableResource"
      summary: "获取学生课表信息（日课表，周课表公用）"
      description: "小程序调用"
      operationId: "getStudentCourseTablesDayOrWeek"
      parameters:
        - name: "validCode"
          in: "query"
          description: "加密验证码&signKey=123123"
          type: "string"
          required: true
        - in: "body"
          name: "courseparms"
          description: "查询课表条件集合"
          required: true
          schema:
            $ref: "#/definitions/CourseParms"
      responses:
        200:
          description: "成功"
          schema:
            type: array
            items:
              $ref: "#/definitions/CourseTableDate"
        404:
          description: "未找到日期信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/coursetables/{userId}":
    get:
      tags:
        - "CourseTableResource"
      summary: "根据学生Id,课程id和学期查询课表信息"
      description: "云课堂前端使用"
      produces:
        - "application/json"
      parameters:
        - name: "userId"
          type: "string"
          in: "path"
          description: "学生Id"
          required: true
        - name: "courseIds"
          type: "string"
          in: "query"
          description: "课程ID,多个用“,”隔开"
          required: true
        - name: "schoolYear"
          type: "string"
          in: "query"
          description: "学年"
          required: true
        - name: "term"
          type: "integer"
          in: "query"
          description: "学期"
          required: true
        - name: "validCode"
          in: "query"
          description: "加密验证码userId=?&signKey=123123"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: array
            items:
              $ref: "#/definitions/StudentHomepageCourse"
        401:
          description: "解密验证失败"
        404:
          description: "未找到课表信息"
        400:
          description: "参数不正确"
        500:
          description: "服务器异常"

  "/courses":
    post:
      tags:
        - "CourseResource"
      summary: "保存课程"
      description: "数据对接使用"
      parameters:
        - name: "validCode"
          in: "query"
          description: "加密验证码（&signKey=123123）"
          type: "string"
          required: true
        - name: "courses"
          in: "body"
          required: true
          description: "课程列表"
          schema:
            type: array
            items:
              $ref: "#/definitions/CourseInfo"
      responses:
        200:
          description: "成功"
        401:
          description: "解密验证失败"
        400:
          description: "参数不正确"
        500:
          description: "服务器异常"

  /v1/courseTables/teacherCourseList:
    get:
      tags:
        - "CourseTableResource"
      summary: "根据老师Id和学期查询课表信息"
      description: "云课堂前端使用"
      operationId: "courseTablesTeacherCourseListGet"
      produces:
        - "application/json"
      parameters:
        - name: "schoolYear"
          in: query
          description: 学年
          required: true
          type: string
          allowEmptyValue: false
        - name: term
          in: query
          description: 学期
          required: true
          type: integer
          format: int32
          allowEmptyValue: false
        - name: userId
          in: query
          description: 老师Id
          required: true
          type: string
          allowEmptyValue: false
        - name: validCode
          in: query
          description: 加密验证码userId=?&signKey=123123
          required: true
          type: string
          allowEmptyValue: false
        - name: courseStudentTypes
          in: query
          description: 允许的授课学生类型的开课
          required: false
          type: string
        - name: isNeedDistinguish
          in: query
          description: "是否需要区分授课学生类型"
          required: false
          type: boolean
      responses:
        '200':
          description: 成功
          schema:
            type: "array"
            items:
              $ref: "#/definitions/CourseResource"
        '400':
          description: 参数不正确
        '401':
          description: 解密验证失败
        '404':
          description: 未找到课表信息
        '500':
          description: 服务器异常

  "/dibblingvideo/coursetable":
    get:
      tags:
        - "DibblingVideo"
      summary: "获取课程视频详情信息"
      description: "云课堂-管理端"
      produces:
        - "application/json"
      parameters:
        - name: "id"
          in: "query"
          description: "课表Id"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "&signKey=123123"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: '#/definitions/CourseTableVo'
        401:
          description: "解密验证失败"
        400:
          description: "参数不正确"
        500:
          description: "服务器异常"

  /evaluation/currentcoursetable:
    get:
      tags:
        - "Evaluation"
      summary: "获取老师当前时间的课表信息"
      description: "小程序"
      produces:
        - "application/json"
      parameters:
        - name: "teacherId"
          type: "string"
          in: "query"
          description: "老师id"
          required: true
        - name: "delayTime"
          type: "string"
          in: "query"
          description: "课前提前时间/课后延长时间"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/EvaluationCourseTableVo"
        400:
          description: "参数不正确"
        403:
          description: "验证码错误"
        404:
          description: "老师当前时间不存在正在上课的课表"
        500:
          description: "服务器异常"

  '/allcourseresource':
    get:
      tags:
        - 'CourseResources'
      summary: '获取所有课程信息，教研室管理、权限课程数据对接调用'
      description: ''
      parameters:
        - in: 'query'
          name: 'validCode'
          required: true
          type: "string"
          description: 'MD5加密验证字符串（&signKey=123123）'
      responses:
        200:
          description: "操作成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/CourseResourceVo"
        400:
          description: "参数异常"
        403:
          description: "验证码错误"

  /resource/testpapers:
    get:
      tags:
        - TestPaper
      summary: 根据courseId及teacherId获取备课包下测验资源
      description: '互动课堂备课包获取该老师该课程下的测验资源,接口做排序'
      operationId: getTestPapers
      produces:
        - '*/*'
      parameters:
        - name: courseId
          in: query
          description: 课程Id
          required: true
          type: string
          allowEmptyValue: false
        - name: teacherId
          in: query
          description: 教师Id
          required: true
          type: string
          allowEmptyValue: false
        - name: testName
          in: query
          description: 测验名称
          required: false
          type: string
        - name: validCode
          in: query
          description: '验证码（courseId={}&signKey=123123）'
          required: true
          type: string
          allowEmptyValue: false
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/TestPaperResource'
        '400':
          description: 参数异常，接受传入的参数类型不正确、必填参数未填写
        '403':
          description: 传入的加密参数未通过验证
        '404':
          description: 资源路径参数对应的资源未找到
        '409':
          description: 自定义错误


  "/realtimeschedule":
    get:
      tags:
        - "CourseTableResource"
      summary: "获取课表信息（实时课表）"
      description: "电子班牌调用（1：实时课表；2：巡课）"
      parameters:
        - name: "roomId"
          in: "query"
          description: "教室id"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "加密验证码roomId={xxx}&signKey=123123"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/RealTimeSchedule"
        404:
          description: "未找到日期信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  /courseresources/courseinfo:
    get:
      tags:
        - 'CourseResources'
      summary: '根据课程名称/课程编号查询课程信息'
      description: '云课堂小程序端使用'
      operationId: "getCourseInfo"
      parameters:
        - in: 'query'
          name: 'validCode'
          required: true
          type: string
          description: 'MD5加密验证字符串（&signKey=123123）'
        - in: 'query'
          name: 'courseNameOrNo'
          type: string
          description: '课程名称/课程编号'
          required: true
        - in: 'query'
          name: 'page'
          type: 'integer'
          required: true
          description: '当前页'
        - in: 'query'
          name: 'pageSize'
          type: 'integer'
          description: '每页个数'
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/CourseInfoPageVo"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"


  /courseresources/courseinfos:
    get:
      tags:
        - 'CourseResources'
      summary: '根据课程名称/课程编号模糊查询课程信息'
      description: '教研室平台 添加已有课程使用 '
      operationId: "getCourseInfos"
      parameters:
        - in: 'query'
          name: 'validCode'
          required: true
          type: string
          description: 'MD5加密验证字符串（&signKey=123123）'
        - in: 'query'
          name: 'courseNameOrNo'
          type: string
          description: '课程名称/课程编号'
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: array
            items:
              $ref: "#/definitions/CourseInfoResourceVo"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"


  '/foundationcourse':
    get:
      tags:
        - 'CourseResources'
      summary: '查询基础课程信息；相同课程名称去重'
      description: '使用方：1.赏课'
      operationId: getFoundationCourseList
      parameters:
        - in: 'query'
          name: 'validCode'
          required: true
          type: string
          description: 'MD5加密验证字符串'
        - in: 'query'
          name: 'courseName'
          type: string
          description: '课程名称'
          required: false
        - in: 'query'
          name: 'teacherNo'
          type: string
          description: '教师工号'
          required: false
        - in: 'query'
          name: 'startTime'
          type: string
          description: '时间范围-开始时间'
        - in: 'query'
          name: 'endTime'
          type: string
