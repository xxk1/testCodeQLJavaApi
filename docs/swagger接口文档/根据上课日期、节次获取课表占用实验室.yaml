swagger: "2.0"
info:
  title: "CourseApi-Api文档"
  version: "1.0.0"
  description: "课表信息接口文档"
host: "192.168.1.34:8080"
basePath: "/v1"
schemes:
  - "http"
paths:
  "/coursetables/coursetabledetailoccupancylablist":
    get:
      tags:
        - "CourseTableResource"
      summary: "根据上课日期、节次获取课表占用实验室"
      description: "使用方：teachinglaboratoryapi项目使用"
      operationId: "getCourseTableDetailOccupancyLabList"
      produces:
        - "application/json"
      parameters:
        - name: "courseDate"
          in: "query"
          description: "上课日期（格式：yyyy-MM-dd）"
          type: "string"
          required: true
        - name: "courseSegments"
          in: "query"
          description: "课程节次（多个用“,”隔开，如：1,2,3）"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "courseDate={}&signKey=123123"
          type: "string"
          required: true
      responses:
        200:
          description: "成功，返回占用实验室id列表"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/OccupancyLabResource"
        "400":
          description: "参数异常"
          schema:
            $ref: "#/definitions/ErrorResult"
        "403":
          description: "验证码不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        "500":
          description: "服务器异常"


definitions:
  ErrorResult:
    type: "object"
    properties:
      code:
        type: "string"
        description: "错误码"
      error:
        type: "string"
        description: "错误信息"

  OccupancyLabResource:
    type: "object"
    properties:
      roomId:
        type: "string"
        description: "教室Id"

