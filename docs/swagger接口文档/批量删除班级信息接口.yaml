swagger: "2.0"
info:
  title: "CourseApi-Api文档"
  version: "1.0.0"
  description: "班级管理相关接口文档"
host: "192.168.1.34:8080"
basePath: "/v1"
schemes:
  - "http"
paths:
  "/groups/batchdelete":
    post:
      tags:
        - "Group"
      operationId: "deleteGroupGroupIds"
      summary: "批量删除班级信息"
      description: "使用方：1、云课堂管理端-基础数据-班级信息"
      produces:
        - "application/json"
      parameters:
        - name: "deleteParam"
          in: "body"
          description: "删除参数"
          schema:
            $ref: "#/definitions/DeleteGroupParam"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"   
          schema:
            $ref: "#/definitions/ErrorResult"          
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult" 
        404:
          description: "有未找到的班级信息"
          schema:
            $ref: "#/definitions/ErrorResult"             
        409:
          description: "业务错误（只有手动添加的班级才能删除）"
          schema:
            $ref: "#/definitions/ErrorResult"               
        500:
          description: "服务器异常"          

definitions:

  ErrorResult:
    type: "object"
    properties:
      code:
        type: "string"
        description: "错误码"
      message:
        type: "string"
        description: "错误信息"        

  DeleteGroupParam:
    type: "object"
    properties:
      operatorId:
        type: "string"
        description: "操作人员id"
      operatorName:
        type: "string"
        description: "操作人员姓名"
      deleteGroupIds:
        type: "array"
        description: "删除班级id列表"
        items:
          $ref: "#/definitions/DeleteGroupIdVo"         
        
  DeleteGroupIdVo:
    type: "object"
    properties:
      groupId:
        type: "string"
        description: "班级id"        
        
