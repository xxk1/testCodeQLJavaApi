swagger: "2.0"
info:
  title: "CourseApi-Api文档"
  version: "1.0.0"
  description: "班级管理相关接口文档"
host: "192.168.1.34:8080"
basePath: "/v1"
schemes:
  - "http"
paths:
  "/groups/groupmembers":
    post:
      tags:
        - "Group"
      summary: "班级学生信息查询"
      description: "使用方：1、云课堂管理端-基础数据-班级学生信息"
      operationId: "getGroupMemberResourceList"
      produces:
        - "application/json"
      parameters:
        - name: "queryParam"
          in: "body"
          description: "查询条件"
          schema:
            $ref: "#/definitions/GroupMemberQueryParamVo"
          required: true
        - name: "validCode"
          in: "query"
          description: "加密验证码&signKey=123123"
          required: true
          type: "string"
          allowEmptyValue: false
      responses:
        '200':
          description: "成功"
          schema:
            $ref: '#/definitions/GroupMemberResourcePage'
        '400':
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        '403':
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        '500':
          description: "服务器异常"

  "/groups/groupmembers/batchdelete":
    post:
      tags:
        - "Group"
      operationId: "deleteGroupMembersByGroupMembers"
      summary: "批量删除班级学生信息"
      description: "使用方：1、云课堂管理端-基础数据-班级学生信息"
      produces:
        - "application/json"
      parameters:
        - name: "deleteParam"
          in: "body"
          description: "删除参数"
          schema:
            $ref: "#/definitions/DeleteGroupMembersParam"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "有未找到的班级学生信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务错误（只有手动添加的学生才能删除）"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /v1/groupmember/importstudents:
    post:
      summary: 学生信息批量导入
      tags:
        - GroupMember
      responses:
        '200':
          description: 成功
          schema:
            $ref: '#/definitions/ImportStudentsVo'
        '400':
          description: 参数异常
          schema:
            $ref: '#/definitions/ErrorResult'
        '403':
          description: 验证码错误
          schema:
            $ref: '#/definitions/ErrorResult'
        '500':
          description: 服务器异常
          schema:
            $ref: '#/definitions/ErrorResult'
        '409':
          description: 业务异常
          schema:
            $ref: '#/definitions/ImportClassVo'
      operationId: importStudents
      description: 调用方：1、云课堂管理端web端-基础数据管理教学班学生信息管理调用
      parameters:
        - type: string
          in: query
          name: validCode
          description: 加密验证码&signKey=123123
          required: true
        - in: formData
          type: file
          name: importFile
          description: 导入的excel文件
          required: true
        - type: string
          in: query
          name: operatorid
          description: 操作人id
          required: true
        - type: string
          in: query
          name: operatorname
          description: 操作人姓名
          required: true

definitions:

  ErrorResult:
    type: "object"
    properties:
      code:
        type: "string"
        description: "错误码"
      message:
        type: "string"
        description: "错误信息"

  GroupMemberQueryParamVo:
    type: "object"
    properties:
      page:
        type: "integer"
        description: "当前页"
      pageSize:
        type: "integer"
        description: "每页个数"
      schoolYear:
        type: "string"
        description: "学年"
      term:
        type: "integer"
        description: "学期"
      courseName:
        type: "string"
        description: "课程名称"
      className:
        type: "string"
        description: "班级名称"
      studentNoOrName:
        type: "string"
        description: "学号或姓名"

  GroupMemberResourcePage:
    type: "object"
    properties:
      total:
        type: "integer"
        description: "总记录数"
      totalPage:
        type: "integer"
        description: "总页数"
      page:
        type: "integer"
        description: "当前页码"
      pageSize:
        type: "integer"
        description: "每页记录数"
      groupMemberResourceList:
        type: "array"
        description: "当前页列表数据"
        items:
          $ref: "#/definitions/GroupMemberResourceVo"

  GroupMemberResourceVo:
    type: "object"
    properties:
      groupMemberId:
        type: "string"
        description: "班级人员id"
      schoolYear:
        type: "string"
        description: "学年"
      term:
        type: "integer"
        description: "学期"
      schoolYearTermNickName:
        type: "string"
        description: "学年学期昵称"
      courseCode:
        type: "string"
        description: "课程编码"
      courseName:
        type: "string"
        description: "课程名称"
      groupNo:
        type: "string"
        description: "班级编号"
      groupName:
        type: "string"
        description: "班级名称"
      studentNo:
        type: "string"
        description: "学生学号"
      studentName:
        type: "string"
        description: "学生姓名"
      source:
        type: "string"
        description: "数据来源"

  DeleteGroupMembersParam:
    type: "object"
    properties:
      operatorId:
        type: "string"
        description: "操作人员id"
      operatorName:
        type: "string"
        description: "操作人员姓名"
      deleteGroupMembers:
        type: "array"
        description: "删除班级人员id列表"
        items:
          $ref: "#/definitions/DeleteGroupMemberIdVo"

  DeleteGroupMemberIdVo:
    type: "object"
    properties:
      groupMemberId:
        type: "string"
        description: "班级人员id"
  ImportStudentsVo:
    title: ImportStudentVo
    type: object
    description: 批量导入班级学生信息自定义异常返回值
    properties:
      successRows:
        type: integer
        description: 成功条数
      errorRows:
        type: integer
        description: 异常条数
      errorInfo:
        type: array
        description: 异常信息详情
        items:
          type: string

