swagger: "2.0"
info:
  description: "上课教学信息统计接口接口文档"
  version: "1.0.0"
  title: "上课教学信息统计接口接口文档"
host: "192.168.1.34:8080"
basePath: "/v1"
schemes:
  - "https"
  - "http"

paths:
  "/coursetable/statistics":
    get:
      tags:
        - 'CourseTableInClass'
      operationId: "getCourseTableStatistics"
      summary: "获取课程相关统计信息"
      description: "1.矿大门户-获取课程相关统计信息"
      parameters:
        - name: "validCode"
          in: "query"
          description: "加密验证码&signKey=123123"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/CourseTableStatisticsResource"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        404:
          description: "未找到此课表信息"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"

definitions:
  ErrorResult:
    type: "object"
    properties:
      code:
        type: "string"
        description: "错误码"
      message:
        type: "string"
        description: "错误信息"

  CourseTableStatisticsResource:
    type: object
    properties:
      inClassRoomNum:
        type: integer
        description: "正在上课的教室数量"
      inClassStudentNum:
        type: integer
        description: "正在上课的学生数量"
      courseInfoCollegeNum:
        type: integer
        description: "开课学院数量"
      courseInfoCourseNum:
        type: integer
        description: "开课课程数量"