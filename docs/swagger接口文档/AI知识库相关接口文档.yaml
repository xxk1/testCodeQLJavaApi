swagger: "2.0"
info:
  description: "AI知识库相关接口"
  version: "1.0.0"
  title: "teachingApi文档"
host: "192.168.1.34:8080"
basePath: "/v1"
schemes:
  - "https"
  - "http"
paths:
  /aiknowledgebase/list:
    get:
      tags:
        - "AIKnowledgeBase"
      summary: "接口-根据条件获取AI知识库数据(课程教材、课件资源)"
      description: "调用方：1、内部调用"
      operationId: "getAIKnowledgeBaseList"
      parameters:
        - name: "userId"
          in: "query"
          description: "用户id"
          type: "string"
          required: true
        - name: "courseId"
          in: "query"
          description: "课程id"
          type: "string"
          required: true
        - name: "aiKnowledgeBaseTypeIndex"
          in: "query"
          description: "AI知识库类型序号(null:全部类型;0:课程教材;1:课件资源;)"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/AIKnowledgeBaseVo"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

definitions:

  AIKnowledgeBaseVo:
    type: "object"
    properties:
      id:
        type: 'string'
        description: 'id'
      resourceName:
        type: 'string'
        description: '文件名称'
      aiKnowledgeBaseTypeIndex:
        type: 'integer'
        description: 'AI知识库类型编号(0:课程教材;1:课件资源;)'
      aiKnowledgeBaseTypeName:
        type: 'integer'
        description: 'AI知识库类型名称(0:课程教材;1:课件资源;)'
      innerIp:
        type: 'string'
        description: '内网ip'
      outerIp:
        type: 'string'
        description: '外网ip'
      filePath:
        type: "string"
        description: "文件路径"
      fileType:
        type: "string"
        description: "文件类型"
      sourceType:
        type: integer
        description: "课程来源类型 (0:个人;1:公共)"
      creatorId:
        type: string
        description: "操作人Id"
      creatorName:
        type: string
        description: "操作人姓名"
      createTime:
        type: string
        description: "创建时间"

  ErrorResult:
    type: "object"
    properties:
      code:
        type: "string"
        description: "错误码"
      error:
        type: "string"
        description: "错误信息"





