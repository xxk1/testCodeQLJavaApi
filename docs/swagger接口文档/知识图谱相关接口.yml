swagger: "2.0"
info:
  description: "知识图谱相关接口"
  version: "1.0.0"
  title: "知识图谱相关接口文档"
host: "192.168.1.34:8080"
basePath: "/v1"
schemes:
  - "https"
  - "http"
paths:
  /courseknowledgegraph/{courseId}:
    get:
      tags:
        - "CourseKnowledgeGraph"
      summary: "接口-根据课程id获取该课程对应知识节点树形结构"
      description: "调用方：1、老师端"
      operationId: getCourseKnowledgeGraphTree
      parameters:
        - name: "courseId"
          in: "path"
          description: "课程id"
          required: true
          type: "string"
        - name: "validCode"
          in: "query"
          description: "验证码：courseId=xxx&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: '#/definitions/CourseKnowledgeGraphNodeTreeModel'
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraph:
    post:
      tags:
        - "CourseKnowledgeGraph"
      summary: "接口-新增知识图谱知识节点"
      description: "调用方：1、老师端"
      operationId: createCourseKnowledgeGraphNode
      parameters:
        - name: "courseKnowledgeGraphNodeData"
          in: 'body'
          required: true
          description: "新增知识图谱节点参数"
          schema:
            $ref: "#/definitions/CourseKnowledgeGraphNodeData"
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraph/{courseId}/{courseKnowledgeGraphNodeId}:
    post:
      tags:
        - "CourseKnowledgeGraph"
      summary: "接口-根据课程id和课程知识图谱知识节点id删除对应知识节点、子节点以及对应关系"
      description: "调用方：1、老师端"
      operationId: deleteCourseKnowledgeGraphNode
      parameters:
        - name: "courseId"
          in: "path"
          description: "课程id"
          required: true
          type: "string"
        - name: "courseKnowledgeGraphNodeId"
          in: "path"
          description: "课程知识图谱知识点id"
          required: true
          type: "string"
        - name: "courseKnowledgeGraphId"
          in: "path"
          description: "课程知识图谱id"
          required: true
          type: "string"
        - name: "accessUserId"
          in: "query"
          description: "访问用户id"
          type: "string"
          required: true
        - name: "accessUserName"
          in: "query"
          description: "访问用户名称"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraph/nodeinfo:
    get:
      tags:
        - "CourseKnowledgeGraph"
      summary: "接口-根据课程id和节点id获取知识节点详情信息"
      description: "调用方：1、老师端"
      operationId: getCourseKnowledgeGraphNodeInfo
      parameters:
        - name: "courseId"
          in: "query"
          description: "课程id"
          type: "string"
          required: true
        - name: "courseKnowledgeGraphNodeId"
          in: "query"
          description: "课程知识图谱知识点id"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: '#/definitions/CourseKnowledgeGraphNodeModel'
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraph/node:
    post:
      tags:
        - "CourseKnowledgeGraph"
      summary: "接口-根据课程id和节点id修改知识节点对应基本信息"
      description: "调用方：1、老师端"
      operationId: updateCourseKnowledgeGraphNode
      parameters:
        - name: "courseKnowledgeGraphNodeParam"
          in: 'body'
          required: true
          description: "新增知识图谱节点参数"
          schema:
            $ref: "#/definitions/CourseKnowledgeGraphNodeParam"

        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: '#/definitions/CourseKnowledgeGraphNodeModel'
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraph/noderelationships:
    get:
      tags:
        - "CourseKnowledgeGraph"
      summary: "接口-根据课程id和节点id获取知识节点相关关系列表"
      description: "调用方：1、老师端"
      operationId: getCourseKnowledgeGraphNodeRelationshipList
      parameters:
        - name: "courseId"
          in: "query"
          description: "课程id"
          type: "string"
          required: true
        - name: "courseKnowledgeGraphId"
          in: "query"
          description: "课程知识图谱id"
          type: "string"
          required: true
        - name: "courseKnowledgeGraphNodeId"
          in: "query"
          description: "课程知识图谱知识点id"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: '#/definitions/CourseKnowledgeGraphNodeRelationshipResource'
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraph/{courseId}/noderelationship/{courseKnowledgeGraphNodeId}/{relationshipId}:
    post:
      tags:
        - "CourseKnowledgeGraph"
      summary: "接口-根据课程id和关系id删除对应关系"
      description: "调用方：1、老师端"
      operationId: deleteCourseKnowledgeGraphNodeRelationship
      parameters:
        - name: "relationshipId"
          in: "path"
          description: "关系id"
          required: true
          type: "string"
        - name: "courseKnowledgeGraphNodeId"
          in: "path"
          description: "课程知识点id"
          required: true
          type: "string"
        - name: "courseId"
          in: "path"
          description: "课程id"
          type: "string"
          required: true
        - name: "courseKnowledgeGraphId"
          in: "query"
          description: "课程知识图谱id"
          type: "string"
          required: true
        - name: "accessUserId"
          in: "query"
          description: "访问用户id"
          type: "string"
          required: true
        - name: "accessUserName"
          in: "query"
          description: "访问用户名称"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码：relationshipId=xxx&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraph/{courseId}/noderelationship:
    post:
      tags:
        - "CourseKnowledgeGraph"
      summary: "接口-根据相关信息创建对应节点关系"
      description: "调用方：1、老师端"
      operationId: createCourseKnowledgeGraphNodeRelationship
      parameters:
        - name: "courseId"
          in: "path"
          description: "课程id"
          type: "string"
          required: true
        - name: "courseKnowledgeGraphNodeRelationshipParam"
          in: 'body'
          required: true
          description: "新增知识图谱节点关系参数"
          schema:
            $ref: "#/definitions/CourseKnowledgeGraphNodeRelationshipParam"
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraph/nodefiles:
    get:
      tags:
        - "CourseKnowledgeGraph"
      summary: "接口-根据课程id和节点id获取学习材料列表"
      description: "调用方：1、老师端"
      operationId: getCourseKnowledgeGraphNodeFileList
      parameters:
        - name: "courseId"
          in: "query"
          description: "课程id"
          type: "string"
          required: true
        - name: "courseKnowledgeGraphNodeId"
          in: "query"
          description: "课程知识图谱知识点id"
          type: "string"
          required: true
        - name: "courseKnowledgeGraphId"
          in: "query"
          description: "课程知识图谱id"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/CourseKnowledgeGraphNodeFileModel"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
    post:
      tags:
        - "CourseKnowledgeGraph"
      summary: "接口-根据课程id和节点id保存学习材料"
      description: "调用方：1、老师端"
      operationId: createCourseKnowledgeGraphNodeFileList
      parameters:
        - name: "courseKnowledgeGraphNodeFileParam"
          in: 'body'
          required: true
          description: "新增知识图谱节点学习材料参数"
          schema:
            $ref: "#/definitions/CourseKnowledgeGraphNodeFileParam"
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraph/nodefile/{nodeFileId}:
    post:
      tags:
        - "CourseKnowledgeGraph"
      summary: "接口-根据节点学习材料id删除对应学习材料"
      description: "调用方：1、老师端"
      operationId: deleteCourseKnowledgeGraphNodeFile
      parameters:
        - name: "nodeFileId"
          in: "path"
          description: "节点学习材料id"
          required: true
          type: "string"
        - name: "accessUserId"
          in: "query"
          description: "访问用户id"
          type: "string"
          required: true
        - name: "accessUserName"
          in: "query"
          description: "访问用户名称"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码：nodeFileId=?&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraph/nodefile/reorder:
    post:
      tags:
        - "CourseKnowledgeGraph"
      summary: "接口-根据节点id拖动学习材料排序"
      description: "调用方：1、老师端"
      operationId: reorderCourseKnowledgeGraphNodeResource
      parameters:
        - name: "nodeFileReorderParam"
          in: "body"
          description: "节点文件重新排序参数"
          required: true
          schema:
            $ref: "#/definitions/NodeFileReorderParam"
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraph/{courseId}/list:
    get:
      tags:
        - "CourseKnowledgeGraph"
      summary: "接口-根据课程id获取对应节点和关系列表"
      description: "调用方：1、老师端"
      operationId: getCourseKnowledgeGraphClassifyResource
      parameters:
        - name: "courseId"
          in: "path"
          description: "课程id"
          required: true
          type: "string"
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/CourseKnowledgeGraphClassifyResource"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraph/importolddata:
    post:
      tags:
        - "CourseKnowledgeGraph"
      summary: "接口-历史课程知识结构数据导入图谱"
      description: "调用方：1、老师端"
      operationId: importKnowledgeStructure
      parameters:
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraph/{courseId}/sort:
    post:
      tags:
        - "CourseKnowledgeGraph"
      summary: "接口-知识图谱排序修改"
      description: "调用方：1、老师端"
      operationId: courseKnowledgeGraphSort
      parameters:
        - name: "courseId"
          in: "path"
          description: "课程id"
          required: true
          type: "string"
        - name: "accessUserId"
          in: "query"
          description: "访问用户id"
          type: "string"
          required: true
        - name: "accessUserName"
          in: "query"
          description: "访问用户名称"
          type: "string"
          required: true
        - name: "courseKnowledgeGraphId"
          in: "query"
          description: "课程知识图谱id"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
        - name: "courseKnowledgeGraphNodeTreeModel"
          in: "body"
          description: "课程知识图谱树形结构参数"
          required: true
          schema:
            $ref: "#/definitions/CourseKnowledgeGraphNodeTreeModel"
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraphclass:
    post:
      tags:
        - "CourseKnowledgeGraph"
      summary: "新增/修改知识图谱公开班级"
      description: "1.云课堂老师端-我的课程知识图谱功能使用"
      operationId: addOrUpdateCourseKnowledgeGraphClass
      parameters:
        - name: validCode
          in: query
          description: 验证码&signKey=123123
          type: string
          required: true
        - name: courseKnowledgeGraphInfo
          in: body
          required: true
          description: "退回信息"
          schema:
            $ref: "#/definitions/CourseKnowledgeGraphInfo"
      responses:
        200:
          description: "成功"
        400:
          description: "错误的请求"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证信息错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
    get:
      tags:
        - "CourseKnowledgeGraph"
      summary: "查看知识图谱公开班级"
      description: "1.云课堂老师端-我的课程知识图谱功能使用"
      operationId: getCourseKnowledgeGraphClassList
      parameters:
        - name: validCode
          in: query
          description: 验证码courseId=?&signKey=123123
          type: string
          required: true
        - name: courseId
          in: query
          description: 课程id
          type: string
          required: true
        - name: courseName
          in: query
          description: 课程名称
          type: string
          required: true
        - name: schoolYear
          in: query
          description: 开课学年
          type: string
          required: true
        - name: term
          in: query
          description: 开课学期
          type: integer
          required: true

      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/ClassVo"
        400:
          description: "错误的请求"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证信息错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraph/ispublic:
    get:
      tags:
        - "CourseKnowledgeGraph"
      summary: "判断学生所在教学班是否公开知识图谱"
      description: "1.云课堂学生端-我的课程知识图谱功能使用"
      operationId: checkCourseKnowledgeGraphPublicStatus
      parameters:
        - name: validCode
          in: query
          description: 验证码courseId=?&signKey=123123
          type: string
          required: true
        - name: courseId
          in: query
          description: 课程id
          type: string
          required: true
        - name: schoolYear
          in: query
          description: 开课学年
          type: string
          required: true
        - name: term
          in: query
          description: 开课学期
          type: integer
          required: true
        - name: groupIds
          in: query
          description: 班级id，多个用“,”隔开
          type: string
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "boolean"
            description: "判断是否公开知识图谱"
        400:
          description: "错误的请求"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证信息错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraph/nodequestions:
    get:
      tags:
        - "CourseKnowledgeGraph"
