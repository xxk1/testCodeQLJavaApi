swagger: "2.0"
info:
  description: "知识图谱智能生成相关接口"
  version: "1.0.0"
  title: "知识图谱智能生成相关接口"
host: "192.168.1.34:8080"
basePath: "/v1"
schemes:
  - "https"
  - "http"
paths:
  /courseknowledgegraphaigeneratetask:
    post:
      tags:
        - "CourseKnowledgeGraphAiGenerateTask"
      summary: "接口-根据课程id创建知识图谱智能生成任务"
      description: "调用方：1、teachingApi内部调用"
      operationId: createCourseKnowledgeGraphAiGenerateTask
      parameters:
        - name: "courseknowledgegraphaigeneratetaskCreateParam"
          in: 'body'
          required: true
          description: "知识图谱智能生成任务生成参数"
          schema:
            $ref: "#/definitions/CourseknowledgegraphaigeneratetaskCreateParam"
        - name: "validCode"
          in: "query"
          description: "验证码：courseId=xxx&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: '#/definitions/CourseKnowledgeGraphAiGenerateTaskCreateStatusModel'
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraphaigeneratetask/{courseId}/taskstatus:
    get:
      tags:
        - "CourseKnowledgeGraphAiGenerateTask"
      summary: "接口-根据课程id获取知识图谱智能生成任务相关状态"
      description: "调用方：1、老师端"
      operationId: getCourseKnowledgeGraphAiGenerateTaskTaskStatus
      parameters:
        - name: "courseId"
          in: "path"
          description: "课程id"
          required: true
          type: "string"
        - name: "validCode"
          in: "query"
          description: "验证码：courseId=xxx&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: '#/definitions/CourseKnowledgeGraphAiGenerateTaskTaskStatusModel'
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraphaigeneratetask/{courseId}:
    get:
      tags:
        - "CourseKnowledgeGraphAiGenerateTask"
      summary: "接口-根据课程id获取已成功知识图谱智能生成任务的数据"
      description: "调用方：1、老师端"
      operationId: getCourseKnowledgeGraphAiGenerateTaskTaskData
      parameters:
        - name: "courseId"
          in: "path"
          description: "课程id"
          required: true
          type: "string"
        - name: "validCode"
          in: "query"
          description: "验证码：courseId=xxx&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: '#/definitions/CourseKnowledgeGraphAiGenerateTaskData'
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraphaigeneratetask/{courseId}/immediateuse:
    post:
      tags:
        - "CourseKnowledgeGraphAiGenerateTask"
      summary: "接口-根据课程id立即使用智能生成的知识图谱"
      description: "调用方：1、老师端"
      operationId: immediateUseCourseKnowledgeGraphAiGenerateTask
      parameters:
        - name: "courseId"
          in: "path"
          description: "课程id"
          required: true
          type: "string"
        - name: "validCode"
          in: "query"
          description: "验证码：courseId=xxx&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /courseknowledgegraphaigeneratetask/{courseId}/anomalousoperate:
    post:
      tags:
        - "CourseKnowledgeGraphAiGenerateTask"
      summary: "接口-对courseId的知识图谱智能生成任务进行异常操作(放弃或重新生成)"
      description: "调用方：1、老师端"
      operationId: anomalousOperateCourseKnowledgeGraphAiGenerateTask
      parameters:
        - name: "courseId"
          in: "path"
          description: "课程id"
          required: true
          type: "string"
        - name: "operateStatus"
          in: "query"
          description: "异常操作状态:(0:放弃|丢弃|取消;1:重新生成)"
          type: "integer"
          required: true
        - name: "accessUserId"
          in: "query"
          description: "访问用户id"
          type: "string"
          required: true
        - name: "accessUserName"
          in: "query"
          description: "访问用户名称"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码：courseId=xxx&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
definitions:
  ErrorResult:
    type: "object"
    properties:
      code:
        type: "string"
        description: "错误码"
      error:
        type: "string"
        description: "错误信息"
  CourseknowledgegraphaigeneratetaskCreateParam:
    type: "object"
    properties:
      courseId:
        type: "string"
        description: "课程id"
      schoolYear:
        type: "string"
        description: "学年"
      term:
        type: "integer"
        description: "学期"
      groupId:
        type: "string"
        description: "教学班id"

  CourseKnowledgeGraphAiGenerateTaskCreateStatusModel:
    type: "object"
    properties:
      status:
        type: "integer"
        description: "任务状态：0:生成失败;1:生成成功"
      remark:
        type: "string"
        description: "备注"
  CourseKnowledgeGraphAiGenerateTaskTaskStatusModel:
    type: "object"
    properties:
      status:
        type: "integer"
        description: "任务状态：0:没有任务;1:生成中;2:生成成功;3:生成失败;"
      remark:
        type: "string"
        description: "备注"
  CourseKnowledgeGraphAiGenerateTaskData:
    type: "object"
    properties:
      id:
        type: "string"
        description: "主键id"
      graphContent:
        type: "string"
        description: "知识图谱内容"
