swagger: "2.0"
info:
  title: "CourseApi-Api文档"
  version: "1.0.0"
  description: "获取课程信息的接口文档"
host: "192.168.1.34:8080"
basePath: "/v1"
schemes:
  - "http"
  - "https"
paths:
  /student/{id}/courseTableDetail:
    post:
      tags:
        - "StudentCourseTableDetail"
      summary: "获取学生课表详情"
      description: "学生端使用"
      operationId: "getStudentCourseTableDetail"
      produces:
        - "application/json"
      parameters:
        - name: "id"
          in: "path"
          description: "学生Id"
          required: true
          type: "string"
        - name: "validCode"
          in: "query"
          description: "加密验证码id={}&signKey=123123"
          required: true
          type: "string"
        - name: "param"
          in: "body"
          description: "请求参数"
          required: true
          schema:
            $ref: "#/definitions/StudentCourseTableDetailParam"
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/StudentCourseTableDetailBaseResource"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"


  /student/{id}/courseTableDetail/weekdetailinfo:
    get:
      tags:
        - "StudentCourseTableDetail"
      summary: "获取学生周课表详情"
      description: "学生端使用"
      operationId: "getStudentCourseTableDetailWeekDetailInfo"
      produces:
        - "application/json"
      parameters:
        - name: "id"
          in: "path"
          description: "学生Id"
          required: true
          type: "string"
        - name: "validCode"
          in: "query"
          description: "加密验证码id={}&signKey=123123"
          required: true
          type: "string"
        - name: courseDate
          in: "query"
          description: "上课日期"
          required: true
          type: "string"
        - name: schoolYear
          in: "query"
          description: "学年"
          required: true
          type: "string"
        - name: term
          in: "query"
          description: "学期"
          required: true
          type: "integer"
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/WeekCourseTableDetailPage"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"


definitions:
  ErrorResult:
    type: "object"
    properties:
      code:
        type: "string"
  StudentCourseTableDetailParam:
    type: "object"
    properties:
      schoolYear:
        type: "string"
        description: "学年"
      term:
        type: "integer"
        description: "学期"
      type:
        type: "integer"
        description: "类型 0:全部；1：未上课的"

  StudentCourseTableDetailBaseResource:
    type: "object"
    properties:
      courseTableDetailId:
        type: "string"
        description: "课表详情Id"
      courseName:
        type: "string"
        description: "课程名称"
      roomId:
        type: "string"
        description: "教室Id"
      roomName:
        type: "string"
        description: "教室名称"
      courseDate:
        type: "string"
        description: "上课日期"
      segments:
        type: "string"
        description: "上课节次"
      segmentStartTime:
        type: "string"
        description: "上课开始时间"
      segmentEndTime:
        type: "string"
        description: "上课结束时间"

  WeekCourseTableDetailPage:
    type: "object"
    properties:
      week:
        type: "string"
        description: "周次"
      weekDateCourseTableDetailList:
        type:  "array"
        items:
          $ref: "#/definitions/WeekDateCourseTableDetailResource"

  WeekDateCourseTableDetailResource:
    type: "object"
    properties:
      weekNum:
        type: "string"
        description: "周几"
      courseDate:
        type: "string"
        description: "日期"
      hasToday:
        type: "boolean"
        description: "是否今天"
      courseTableDetailList:
        type: "array"
        items:
          $ref: "#/definitions/CourseTableDetailInfoModel"
  CourseTableDetailInfoModel:
    type: "object"
    properties:
      courseId:
        type: "string"
        description: "课程Id"
      courseName:
        type: "string"
        description: "课程名称"
      segmentStartTime:
        type: "string"
        description: "上课开始时间"
      segmentEndTime:
        type: "string"
        description: "上课结束时间"
      roomCodes:
        type: "string"
        description: "教室编号"
      roomNames:
        type: "string"
        description: "教室名称"

