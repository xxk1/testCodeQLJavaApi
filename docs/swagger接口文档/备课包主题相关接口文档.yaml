swagger: "2.0"
info:
  description: "备课包主题相关接口接口文档"
  version: "1.0.0"
  title: "courseApi文档"
host: "192.168.1.34:8080"
basePath: "/v1"
schemes:
  - "https"
  - "http"
paths:
  /coursetheme:
    post:
      tags:
        - "CourseTheme"
      summary: "新增、修改主题信息"
      description: "1、云课堂老师端-新增、修改主题信息"
      operationId: "insertOrUpdateCourseTheme"
      parameters:
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
        - name: "courseThemeResource"
          in: "body"
          required: true
          schema:
            $ref: "#/definitions/CourseThemeResource"
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到资源信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  /coursetheme/{id}:
    get:
      tags:
        - "CourseTheme"
      summary: "获取主题信息详情"
      description: "1、云课堂老师端-获取主题信息详情"
      operationId: "getCourseTheme"
      parameters:
        - name: "validCode"
          in: "query"
          description: "验证码：id={}&signKey=123123(md5加密)"
          type: "string"
          required: true
        - name: "id"
          in: path
          description: "主题信息id"
          type: string
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/CourseThemeResource"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到资源信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  /coursetheme/teacher:
    get:
      tags:
        - "CourseTheme"
      summary: "获取老师课程下可用的主题信息"
      description: "1.互动课堂使用-获取老师课程下可用的主题信息"
      operationId: "getTeacherCourseTheme"
      parameters:
        - name: "courseId"
          type: string
          description: "课程id"
          required: true
          in: query
        - name: "teacherId"
          type: string
          description: "教师id"
          required: true
          in: query
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/CourseThemeResource"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
definitions:
  ErrorResult:
    type: "object"
    properties:
      code:
        type: "string"
        description: "错误码"
      error:
        type: "string"
        description: "错误信息"

  CourseThemeResource:
    type: object
    properties:
      id:
        type: string
        description: "主题id，获取详情以及修改主题时使用"
      source:
        type: "integer"
        description: "来源：0:教师备课，1:教学内容"
      operatorId:
        type: string
        description: "操作人id"
      operatorName:
        type: string
        description: "操作人姓名"
      whetherPublic:
        type: boolean
        description: "是否公开"
      courseStructureId:
        type: string
        description: "章节id"
      themeName:
        type: string
        description: "主题名称"
      themeDetailList:
        type: array
        items:
          $ref: "#/definitions/CourseThemeDetailResource"

  CourseThemeDetailResource:
    type: object
    properties:
      id:
        type: string
        description: "主题详情id"
      content:
        type: string
        description: "主题详情内容"
      showOrder:
        type: integer
        description: "主题详情排序"
