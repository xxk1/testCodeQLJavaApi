swagger: "2.0"
info:
  description: "知识图谱相关接口"
  version: "1.0.0"
  title: "知识图谱相关接口文档"
host: "192.168.1.34:8080"
basePath: "/v1"
schemes:
  - "https"
  - "http"
paths:
  /courseknowledgegraphstatistics/{courseId}:
    get:
      tags:
        - "CourseKnowledgeGraphStatistics"
      summary: "接口-根据课程id统计该课程对应知识图谱统计信息"
      description: "调用方：1、老师端课程门户知识图谱"
      operationId: "getCourseKnowledgeGraphStatistics"
      parameters:
        - name: "courseId"
          in: "path"
          description: "课程id"
          required: true
          type: "string"
        - name: "validCode"
          in: "query"
          description: "验证码：courseId=xxx&signKey=123123(md5加密)"
          type: "string"
          required: true
        - name: "minSimilarityScore"
          in: "query"
          description: "最小图谱语音相似性分数"
          type: "number"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: '#/definitions/CourseKnowledgeGraphStatisticsVo'
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

definitions:
  ErrorResult:
    type: "object"
    properties:
      code:
        type: "string"
        description: "错误码"
      error:
        type: "string"
        description: "错误信息"

  CourseKnowledgeGraphStatisticsVo:
    type: "object"
    properties:
      totalLevelCount:
        type: "integer"
        description: "总知识点数量"
      firstLevelCount:
        type: "integer"
        description: "一级知识点数量"
      secondLevelCount:
        type: "integer"
        description: "二级知识点数量"
      thirdLevelCount:
        type: "integer"
        description: "三级知识点数量"
      otherLevelCount:
        type: "integer"
        description: "其他级知识点数量"
      videoFragmentCount:
        type: "integer"
        description: "智能推荐课堂实录的AI课堂切片总数"
      imageResourceCount:
        type: "integer"
        description: "图片资源总数"
      learnVideoResourceCount:
        type: "integer"
        description: "学习视频资源总数"
      documentResourceCount:
        type: "integer"
        description: "文档资源总数"
      classTestCount:
        type: "integer"
        description: "考核测验数总数"
      uploadQuestionCount:
        type: "integer"
        description: "教师上传题目总数"