          type: "string"
          in: "path"
          description: "课程id"
          required: true
        - name: "teacherId"
          type: "string"
          in: "query"
          description: "老师id"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：courseId=?&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/CourseResource"
        400:
          description: "参数不正确"

          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到课程班级信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/preparationcoursebag/{teacherId}/courseteacher":
    get:
      tags:
        - "PreparationCourseBag"
      summary: "接口-老师添加我的课程课程列表信息"
      description: "1.云课堂老师端我的课程使用"
      parameters:
        - name: "teacherId"
          type: "string"
