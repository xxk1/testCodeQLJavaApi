          type: "string"
          in: "path"
          description: "资源id"
          required: true
        - name: "courseId"
          in: "query"
          description: "课程Id"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: OK
          schema:
            type: "array"
            items:
              $ref: "#/definitions/TeachingFileVo"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到资源信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"


  "/preparationcoursebag/{courseId}/teacherCourse":
    get:
      tags:
        - "PreparationCourseBag"
      summary: "接口-发布跳转，获取老师当前学期或下个学期的课程相关信息"
      description: "1.云课堂老师端备课包管理发布使用"
      parameters:
