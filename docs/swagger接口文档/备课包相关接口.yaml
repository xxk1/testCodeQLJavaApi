swagger: "2.0"
info:
  description: "备课包接口文档"
  version: "1.0.0"
  title: "备课包接口文档API"
host: "192.168.1.34:8080"
basePath: "/courseApi/v1"
schemes:
  - "https"
  - "http"
paths:


  '/preparation':
    get:
      tags:
        - "Preparation"
      summary: "老师我的课程信息"
      description: "云课堂调用"
      produces:
        - "application/json"
      parameters:
        - name: "teacherId"
          type: "string"
          in: "query"
          description: "老师id"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：teacherId=?&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/PreparationResource"
        400:
          description: "参数不正确"
        404:
          description: "未找到老师我的课程信息"
        403:
          description: "解密错误"
        500:
          description: "服务器异常"


  "/preparationcoursebag/{courseId}/hide":
    post:
      tags:
        - "PreparationCourseBag"
      summary: "接口-备课包课程隐藏"
      description: "1.云课堂老师端课程管理使用"
      parameters:
        - name: "userId"
          in: "query"
          description: "用户id"
          type: "string"
          required: true
        - name: "userName"
          in: "query"
          description: "用户名称"
          type: "string"
          required: true
        - name: "courseId"
          in: "path"
          description: "课程id"
          type: "string"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：courseId=?&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到资源信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/preparationcoursebag/{courseId}/show":
    post:
      tags:
        - "PreparationCourseBag"
      summary: "接口-备课包课程显示"
      description: "1.云课堂老师端课程管理使用"
      parameters:
        - name: "userId"
          in: "query"
          description: "用户id"
          type: "string"
          required: true
        - name: "courseId"
          in: "path"
          description: "课程id"
          type: "string"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：courseId=?&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到资源信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/preparationcoursebag/classtestpaper":
    post:
      tags:
        - "PreparationCourseBag"
      summary: "创建课堂测验试卷"
      description: "1.云课堂老师端创建课堂测验试卷"
      parameters:
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          required: true
        - name: "testPaperParmVo"
          in: "body"
          required: true
          schema:
            $ref: "#/definitions/TestPaperParmVo"
      responses:
        200:
          description: "OK"
          schema:
            $ref: "#/definitions/TestPaperParmVo"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到题目信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "解密错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/preparationcoursebag/{teacherId}/courses":
    get:
      tags:
        - "PreparationCourseBag"
      summary: "接口-查看老师备课包课程列表"
      description: "1.云课堂老师端备课包管理使用"
      parameters:
        - name: "teacherId"
          type: "string"
          in: "path"
          description: "老师id"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：teacherId=?&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/PreparationCourse"
        400:
          description: "参数不正确"

          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到课程信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/preparationcoursebag/{teacherId}/courseresources":
    get:
      tags:
        - "PreparationCourseBag"
      summary: "接口-老师查看课程结构下资源列表"
      description: "1.云课堂老师端备课包管理使用"
      parameters:
        - name: "teacherId"
          type: "string"
          in: "path"
          description: "老师id"
          required: true
        - name: "courseStructureId"
          type: "string"
          in: "query"
          description: "课程结构id"
          required: true
        - name: "resourceName"
          type: string
          in: query
          description: "资源名称"
          required: false
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：teacherId=?&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/CourseResourceVo"
        400:
          description: "参数不正确"

          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到课程结构信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/preparationcoursebag/courseresource/{id}":
    get:
      tags:
        - "PreparationCourseBag"
      summary: "接口-根据资源 id获取资源信息"
      description: "1.云课堂老师端备课包管理发布使用"
      parameters:
        - name: "id"
          type: "string"
          in: "path"
          description: "资源id"
          required: true
        - name: "teacherId"
          type: "string"
          in: "query"
          description: "老师id"
          required: true
        - name: "courseId"
          type: "string"
          in: "query"
          description: "课程id"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：id=?&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/CourseResourceModule"
        400:
          description: "参数不正确"

          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到课程结构信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/preparationcoursebag/teachingfiles":
    get:
      tags:
        - "PreparationCourseBag"
      summary: "接口-获取备课包老师教学资源"
      description: "互动课堂备课包获取该老师该课程下的教学资源"
      operationId: "getPreparationCourseBagTeachingFiles"
      parameters:
        - name: "teacherId"
          in: "query"
          description: "教师Id"
          type: "string"
          required: true
        - name: "courseId"
          in: "query"
          description: "课程Id"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: OK
          schema:
            type: "array"
            items:
              $ref: "#/definitions/TeachingFileVo"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到资源信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
    post:
      tags:
        - "PreparationCourseBag"
      summary: "接口-更新备课包资源公开状态"
      description: "调用方：1、云课堂管理web端—备课包教学资源"
      operationId: "updateCourseResourceListIsPublic"
      parameters:
        - name: "courseResourceId"
          in: "query"
          description: "课程资源Id集合"
          type: "boolean"
          required: true
        - name: "courseId"
          in: "query"
          description: "课程Id"
          type: "boolean"
          required: true
        - name: "isPublic"
          in: "query"
          description: "是否为公共资源(true:公开；false:隐藏)"
          type: "boolean"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "OK"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "资源信息不存在"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "已存在相同名称公共资源"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/preparationcoursebag/{teacherId}/teachingfiles":
    get:
      tags:
        - "PreparationCourseBag"
      summary: "接口-根据老师id获取老师备课包教学资源"
      description: "互动课堂取该老师该课程下备课包的教学资源（包含视频）"
