swagger: "2.0"
info:
  title: "CourseApi-Api文档"
  version: "1.0.0"
  description: "班级分组方案接口文档"
host: "192.168.1.34:8080"
basePath: "/v1"
schemes:
  - "http"
paths:

  "/classgroupingscheme":
    get:
      tags:
        - "ClassGroupingScheme"
      summary: "获取班级分组方案信息接口"
      description: "调用方：1、云课堂老师web端-班级小组方案查询"
      produces:
        - "application/json"
      operationId: getClassGroupingSchemeList
      parameters:
        - name: "groupId"
          type: "string"
          in: "query"
          description: "班级id"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：groupId={XXX}&signKey=123123(md5加密)"
          required: true
        - name: "schemaType"
          type: "integer"
          in: "query"
          description: "小组方案类型 0:普通小组；1：实验小组"
          required: false
      responses:
        200:
          description: "成功"
          schema:
            type: array
            items:
              $ref: "#/definitions/ClassGroupingSchemeVo"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  "/classgroupingscheme/delete":
    post:
      tags:
        - "ClassGroupingScheme"
      summary: "删除班级分组方案信息接口"
      description: "调用方：1、云课堂老师web端-班级小组方案删除"
      produces:
        - "application/json"
      operationId: deleteClassGroupingScheme
      parameters:
        - name: "classGroupingSchemeId"
          type: "string"
          in: "query"
          description: "班级分组方案id"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：classGroupingSchemeId={xxx}&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

definitions:
  ErrorResult:
    type: "object"
    properties:
      code:
        type: "string"
        description: "错误码"
      message:
        type: "string"
        description: "错误信息"

  ClassGroupingSchemeVo:
    type: "object"
    properties:
      id:
        type: "string"
        description: "班级分组方案Id"
      schemeName:
        type: "string"
        description: "方案名称"
      schemePresentation:
        type: "string"
        description: "方案描述"
      schemeType:
        type: integer
        description: "方案类型 0：普通小组方案；1：实验小组方案"
      groupedHeadCount:
        type: "integer"
        description: "已分组总人数"
      classGroupingCount:
        type: "integer"
        description: "班级分组总数"
      ungroupedHeadCount:
        type: "integer"
        description: "未分组总人数"

