swagger: "2.0"
info:
  description: "评教相关接口"
  version: "1.0.0"
  title: "courseApi文档"
host: "192.168.1.34:8080"
basePath: "/courseApi/api/v1"
schemes:
  - "https"
  - "http"
paths:
  /superviseevaluations/supervisioncourses:
    post:
      tags:
        - "teachers"
      summary: "接口-根据学院id、课程/老师姓名等条件查询督导听课老师课程列表信息"
      description: "1、云课堂管理端督导听课列表接口调用（内部）"
      parameters:
        - name: "supervisorListenCourseQueryParam"
          in: 'body'
          required: true
          description: "督导听课老师课程列表查询条件"
          schema:
            $ref: '#/definitions/SupervisionCourseQueryParam'
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/SupervisionCourseListPage"
        400:
          description: "错误的请求"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证信息错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  /superviseevaluations/coursetables:
    get:
      tags:
        - "CourseTableDetails"
      summary: "接口-根据课表id列表查询课程、老师和直播信息"
      description: "1、云课堂管理端督导听课列表接口调用（内部）"
      parameters:
        - name: "courseTableIds"
          in: 'query'
          required: true
          description: "课表id组合（逗号分割）"
          type: "string"
        - name: "nowTime"
          in: 'query'
          required: true
          description: "现在的时间（yyyy-MM-hh HH:mm:ss）"
          type: "string"
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
        - name: "schoolYear"
          in: "query"
          description: "学年"
          type: "string"
          required: false
        - name: "term"
          in: "query"
          description: "学期"
          type: integer
          required: false
        - name: "studentType"
          in: "query"
          description: "开课类型"
          type: integer
          required: false
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/SupervisionCourseVo"
        400:
          description: "错误的请求"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证信息错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  /superviseevaluations/coursetables/{courseTableId}:
    get:
      tags:
        - "CourseTableDetails"
      summary: "接口-根据课表id查询老师、直播及教室信息"
      description: "1、云课堂管理端督导听课列表接口调用（内部）"
      parameters:
        - name: "courseTableId"
          in: 'path'
          required: true
          description: "课表id"
          type: "string"
        - name: "nowTime"
          in: 'query'
          required: true
          description: "现在的时间（yyyy-MM-hh HH:mm:ss）"
          type: "string"
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/SupervisionCourseResource"
        400:
          description: "错误的请求"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证信息错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  /supervisorrecommend/coursetable:
    post:
      tags:
        - "CourseTableDetails"
      summary: "获取督导听课推荐课程表"
      description: "1、云课堂-督导听课听课调用（内部）"
      operationId: "getSupervisorRecommendCourseTable"
      parameters:
        - name: "supervisorListenCourseQueryParam"
          in: 'body'
          required: true
          description: "督导听课推荐课程表查询条件"
          schema:
            $ref: '#/definitions/SupervisorRecommendQueryParam'
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: array
            items:
              $ref: "#/definitions/CourseTableDetailResource"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"

  /superviseevaluations/notsupervised/course:
    post:
      tags:
        - "CourseTableDetails"
      summary: "获取未被听过课课的课程"
      description: "1、云课堂听查课-督导听课列表接口调用（内部）"
      operationId: "getNotSupervisedCourse"
      parameters:
        - name: "supervisionCourseQueryParam"
          in: body
          required: true
          description: "查询条件"
          schema:
            $ref: '#/definitions/NotSupervisionCourseQueryParam'
        - name: "validCode"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/CourseTableDetailResource"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"

definitions:
  ErrorResult:
    type: "object"
    properties:
      code:
        type: "string"
        description: "错误码"
      error:
        type: "string"
        description: "错误信息"

  SupervisionCourseQueryParam:
    type: "object"
    properties:
      page:
        type: "integer"
        description: "当前页码"
      pageSize:
        type: "integer"
        description: "每页记录数"
      collegeId:
        type: "string"
        description: "学院id"
      courseId:
        type: string
        description: "课程id"
      teacherNameOrNo:
        type: string
        description: "授课教师姓名或工号"
      courseNameOrTeacherName:
        type: "string"
        description: "课程/老师姓名"
      nowTime:
        type: "string"
        description: "现在的时间（yyyy-MM-hh HH:mm:ss）"
      live:
        type: "integer"
        description: "是否直播中（1-直播中，其他不作为查询条件）"
      pagingEnabled:
        type: boolean
        description: "是否需要分页  默认需要"
      sortName:
        type: string
        description: "排序字段名称"
      schoolYear:
        type: string
        description: "学年"
      term:
        type: string
        description: "学期"
      isDistinguishCourseStudentType:
        type: string
        description: "是否需要区分授课学生类型"
      courseStudentTypes:
        type: string
        description: "授课学生类型，多个使用逗号隔开"
      isNeedFilterPoliticalCourse:
        type: boolean
        description: "是否需要过思政课"
      superviseCollegeType:
        type: integer
        description: "督导听课查询学类型 0：授课教师学院；1：开课学院"

  SupervisionCourseListPage:
    type: "object"
    properties:
      page:
        type: "integer"
        description: "当前页码"
      pageCount:
        type: "integer"
        description: "总页数"
      totalCount:
        type: "integer"
        description: "总条数"
      supervisionCourseList:
        type: "array"
        description: "老师课程列表"
        items:
          $ref: "#/definitions/SupervisionCourseVo"

  SupervisionCourseVo:
    type: "object"
    properties:
      classNickName:
        type: "string"
        description: "班级昵称"
      classCompositionName:
        type: "string"
        description: "班级组成"
      source:
        type: "integer"
        description: "班级来源（数据对接,0；系统录入,1；外部导入,2；自主开班,3；）"
      studentType:
        type: "integer"
        description: "开课类型"
      courseTableId:
        type: "string"
        description: "课表id"
      courseName:
        type: "string"
        description: "课程名称"
      className:
        type: "string"
        description: "班级名称"
      teachers:
        type: "string"
        description: "老师信息（姓名+（工号），多个顿号分割）"
      live:
        type: "boolean"
        description: "是否直播中（0-不在直播中，1-直播中）"
      liveCourseTableDetailId:
        type: "string"
        description: "直播中的课表明细id"
      courseTableDetailSegmentStartTime:
        type: "string"
        description: "课表节次开始时间"
      courseTableDetailSegmentEndTime:
        type: "string"
        description: "课表节次结束时间"
      courseAttrName:
        type: string
        description: "课程类别"

  SupervisionCourseResource:
    type: "object"
    properties:
      teachers:
        type: "string"
        description: "老师信息（id+工号+姓名，多个逗号分割）"
      live:
        type: "boolean"
        description: "是否直播中（0-不在直播中，1-直播中）"
      liveCourseTableDetailId:
        type: "string"
        description: "直播中的课表明细id"
      courseTableDetailSegmentStartTime:
        type: "string"
        description: "课表节次开始时间"
      courseTableDetailSegmentEndTime:
        type: "string"
        description: "课表节次结束时间"
      roomId:
        type: "string"
        description: "上课教室id"
      roomName:
        type: "string"
        description: "上课教室名称"
      courseDate:
        type: "string"
        description: "上课日期"
      segment:
        type: "string"
        description: "节次"
      groupId:
        type: "string"
        description: "组ID"

  CourseTableDetailResource:
    type: "object"
    properties:
      id:
        type: string
        description: "课表id"
      courseId:
        type: string
        description: "课程id"
      groupNo:
        type: "string"
        description: "组编号"
      groupName:
        type: string
        description: "组名称"
      courseType:
        type: "string"
        description: "课程类型"
      teacherName:
        type: "string"
        description: "教师名称"
      teacherNameAndNo:
        type: "string"
        description: "教师姓名和编号（格式：名称 编号）"
      schoolYear:
        type: "string"
        description: "学年"
      term:
        type: "string"
        description: "学期"
      courseDate:
        type: "string"
        description: "上课日期"
      courseName:
        type: "string"
        description: "课程名称"
      weekNum:
        type: "string"
        description: "星期几"
      week:
        type: "string"
        description: "周次"
      roomId:
        type: "string"
        description: "教室id"
      roomName:
        type: "string"
        description: "教室名称"
      buildName:
        type: "string"
        description: "教学楼"
      segments:
        type: "string"
        description: "节次"
      segmentStartTime:
        type: "string"
        description: "节次开始时间"
      segmentEndTime:
        type: "string"
        description: "节次结束时间"
      currentSegment:
        type: integer
        description: "当前所处节次"
      collegeId:
        type: "string"
        description: "学院Id"
      collegeName:
        type: "string"
        description: "学院名称"
      courseKind:
        type: integer
        description: "课表类型  0：理论课；1：实践课"
      courseAttrName:
        type: "string"
        description: "课程类别"
      studentNum:
        type: integer
        description: "学生人数"
      hasLive:
        type: boolean
        description: "是否直播"
      teacherResourceList:
        type: "array"
        items:
          $ref: "#/definitions/TeacherResource"
      studentType:
        type: "string"
        description: "学生类型"
      studentTypeName:
        type: "string"
        description: "学生类型名称"
      courseTableId:
        type: "string"
        description: "开课id"
      courseCode:
        type: "string"
        description: "课程编号"
  TeacherResource:
    type: "object"
    properties:
      teacherId:
        type: "string"
        description: "教师id"
      teacherNo:
        type: "string"
        description: "教师工号"
      teacherName:
        type: "string"
        description: "教师名称"
      teacherCollegeId:
        type: string
        description: "老师所属学院id"
      teacherCollegeName:
        type: string
        description: "老师所属学院名称"

  SupervisorRecommendQueryParam:
    type: "object"
    properties:
      supervisorRecommendVoList:
        type: "array"
        items:
          $ref: "#/definitions/SupervisorRecommendVo"

  SupervisorRecommendVo:
    type: "object"
    properties:
      courseId:
        type: "string"
        description: "课程id"
      teacherId:
        type: "string"
        description: "教师id"

  NotSupervisionCourseQueryParam:
    type: "object"
    properties:
      supervisionCourseIdList:
        type: array
        items:
          type: string
      schoolYear:
        type: string
        description: "学年"
      term:
        type: string
        description: "学期"
      isDistinguishCourseStudentType:
        type: string
        description: "是否需要区分授课学生类型"
      courseStudentTypes:
        type: string
        description: "授课学生类型，多个使用逗号隔开"
      isNeedFilterPoliticalCourse:
        type: boolean
        description: "是否需要过思政课"
      superviseCollegeType:
        type: integer
        description: "督导听课查询学类型 0：授课教师学院；1：开课学院"
      queryNum:
        type: integer
        description: "查询数量"
      collegeIds:
        type: string
        description: "有权限的学院id"




