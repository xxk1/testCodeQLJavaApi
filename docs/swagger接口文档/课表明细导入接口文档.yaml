swagger: "2.0"
info:
  description: "课表明细导入接口文档"
  version: "1.0.0"
  title: "课表明细导入接口文档"
host: "192.168.1.34:8080"
basePath: "/v1"
schemes:
  - "https"
  - "http"
paths:

  '/coursetabledetail/import':
    post:
      tags:
        - "CourseTableDetail"
      summary: "课表明细导入"
      description: "课表明细导入，云课堂管理端使用"  
      produces:
        - application/json
      parameters :
        - name: "validCode"
          in: "query"
          description: "加密验证码&signKey=123123"
          type: "string"
          required: true
        - name: "groupCourseTableDetail"
          in: "body"
          description: "导入课表的明细"
          required: true
          schema:
            $ref: "#/definitions/GroupCourseTableInfo"
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        404:
          description: "未找到此课表信息"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"
        409:
          description: 校验未通过
          schema:
            type: array
            items:
              $ref: '#/definitions/ErrorResult'   

  
definitions:
  ErrorResult:
    type: "object"
    properties:
      code:
        type: "string"
        description: "错误码"
      message:
        type: "string"
        description: "错误信息"
  GroupCourseTableInfo:
    type: object
    properties:
      groupId:
        type: string
        description: "班级id"
      courseCode:
        type: string
        description: "课程编号"
      courseName:
        type: string
        description: "课程名称"
      schoolYear:
        type: string
        description: "学年"
      term:
        type: integer
        description: "学期"
      courseTableDetailList:
        type: array
        items:
          $ref: "#/definitions/CourseTableDetailResource"
      
  CourseTableDetailResource:
    type: object
    properties: 
      teacherNo:
        type: string
        description: "教师工号"
      roomName:
        type: string
        description: "教室名称"
      buildName:
        type: string
        description: "楼栋名称"
      courseDate:
        type: string
        description: "课程日期"
      week:
        type: integer
        description: "周次"
      weekNum: 
        type: integer
        description: "周几"
      segments:
        type: string
        description: "节次"
      courseTypeName:
        type: string 
        description: "课程类型"
      