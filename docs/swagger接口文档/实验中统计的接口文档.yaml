swagger: "2.0"
info:
  title: "CourseApi-Api文档"
  version: "1.0.0"
  description: "实验中统计的接口文档"
host: "192.168.1.34:8080"
basePath: "/v1"
schemes:
  - "http"
paths:

  "/teachingcenter/teachingquantity":
    get:
      tags:
        - "TeachingCenterStatistics"
      summary: "获取实验中心课表教学人时数量"
      description: "调用方：云课堂管理端"
      operationId: getTeachingCenterTeachingQuantity
      produces:
        - "application/json"
      parameters:
        - name: "teachingCenterId"
          in: "query"
          description: "实验中心id(不传值则查询全部实验中心数据)"
          type: "string"
          required: false
        - name: "validCode"
          in: "query"
          description: "加密验证码: &signKey=123123"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: integer
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"


  "/teachingcenter/teacherinclassquantity":
    get:
      tags:
        - "TeachingCenterStatistics"
      summary: "获取实验中心上课教师数量"
      description: "调用方：云课堂管理端"
      operationId: getTeacherInClassQuantity
      produces:
        - "application/json"
      parameters:
        - name: "teachingCenterId"
          in: "query"
          description: "实验中心id(不传值则查询全部实验中心数据)"
          type: "string"
          required: false
        - name: "validCode"
          in: "query"
          description: "加密验证码: &signKey=123123"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: integer
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

definitions:
  ErrorResult:
    type: "object"
    properties:
      code:
        type: "string"
        description: "错误码"
      message:
        type: "string"
        description: "错误信息"
