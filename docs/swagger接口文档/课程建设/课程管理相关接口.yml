swagger: "2.0"
info:
  description: "课程管理接口文档"
  version: "1.0.0"
  title: "课程管理接口文档API"
host: "192.168.1.34:8080"
basePath: "/courseApi/v1"
schemes:
  - "https"
  - "http"
paths:
  "/coursemanagement/coursestructure":
    post:
      tags:
        - "CourseManagement"
      summary: "接口-新建课程结构"
      description: "1.云课堂老师端课程管理使用"
      produces:
        - "application/json"
      parameters:
        - name: "structureParam"
          in: "body"
          description: "课程结构相关参数"
          schema:
            $ref: "#/definitions/StructureParam"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到资源信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  '/coursemanagement/uploadresources':
    post:
      tags:
        - "CourseManagement"
      summary: "上传教学资源"
      description: "云课堂老师端调用"
      produces:
        - "application/json"
      parameters:
        - name: "validCode"
          in: "query"
          description: "验证码（&signKey=123123）"
          type: "string"
          required: true
        - name: "teachingContentResource"
          in: "body"
          description: "课程教学内容资源信息"
          schema:
            $ref: "#/definitions/TeachingContentResource"
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到课程结构信息"
        500:
          description: "服务器异常"

  "/coursemanagement/{teacherId}/courses":
    get:
      tags:
        - "CourseManagement"
      summary: "接口-老师查看加入的课程"
      description: "1、云课堂老师端课程管理使用"
      parameters:
        - name: "teacherId"
          in: "path"
          description: "老师id"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码teacherId=?&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/CourseVo"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"
  "/coursemanagement/{teacherId}/courses/{courseId}":
    get:
      tags:
        - "CourseManagement"
      summary: "接口-根据老师id和课程id查询课程建设相关课程信息"
      description: "1、云课堂老师端课程管理使用"
      parameters:
        - name: "teacherId"
          in: "path"
          description: "老师id"
          type: "string"
          required: true
        - name: "courseId"
          in: "path"
          description: "课程id"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码teacherId=?&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/CourseVo"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"
  "/coursemanagement/courseteachingteam":
    post:
      tags:
        - "CourseManagement"
      summary: "接口-老师加入课程教师团队"
      description: "1、云课堂老师端课程管理使用"
      parameters:
        - name: "CourseTeachingTeamVo"
          in: 'body'
          required: true
          description: "加入教师团队信息"
          schema:
            $ref: '#/definitions/CourseTeachingTeamVo'
        - name: "validCode"
          in: "query"
          description: "验证码&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
    get:
      tags:
        - "CourseManagement"
      summary: "接口-查看教师团队"
      description: "1、云课堂老师端课程管理使用"
      parameters:
        - name: "courseId"
          in: 'query'
          type: "string"
          required: true
          description: "课程id"
        - name: "versionId"
          in: 'query'
          type: "string"
          required: true
          description: "课程id"
        - name: "isStatistics"
          in: query
          type: boolean
          required: false
          description: "是否获取统计"
        - name: "validCode"
          in: "query"
          description: "验证码&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/CourseTeachingTeamResource"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到资源信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  "/coursemanagement/courseteachingteam/delete":
    post:
      tags:
        - "CourseManagement"
      summary: "接口-老师退出课程教师团队"
      description: "1、云课堂老师端课程管理使用"
      parameters:
        - name: "userId"
          in: "query"
          description: "操作人Id"
          type: "string"
          required: false
        - name: "userName"
          in: "query"
          description: "操作人名称"
          type: "string"
          required: false
        - name: "courseTeachingTeamId"
          in: "query"
          description: "课程教学团队Id"
          type: "string"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "教师团队数据不存在"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  '/coursemanagement/filename':
    post:
      tags:
        - "CourseManagement"
      summary: "重命名课程资源"
      description: "云课堂老师端调用"
      produces:
        - "application/json"
      parameters:
        - name: "validCode"
          in: "query"
          description: "验证码（&signKey=123123）"
          type: "string"
          required: true
        - name: "userId"
          in: "query"
          description: "用户Id"
          type: "string"
          required: true
        - name: "fileId"
          in: "query"
          description: "资源Id"
          type: "string"
          required: true
        - name: "fileName"
          in: "query"
          description: "资源名称"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/CourseResourceData"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到课程资源信息"
        500:
          description: "服务器异常"

  "/coursemanagement/coursestructurename":
    post:
      tags:
        - "CourseManagement"
      summary: "接口-重命名课程结构"
      description: "1.云课堂老师端课程管理使用"
      produces:
        - "application/json"
      parameters:
        - name: "courseStructureId"
          type: "string"
          in: "query"
          description: "课程结构id"
          required: true
        - name: "courseStructureName"
          type: "string"
          in: "query"
          description: "课程结构名称"
          required: true
        - name: "userId"
          in: "query"
          type: "string"
          description: "用户id"
          required: true
        - name: "userName"
          in: "query"
          type: "string"
          description: "用户名称"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到资源信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  "/coursemanagement/{teacherId}/courseList":
    get:
      tags:
        - "CourseManagement"
      summary: "接口-老师模糊查询课程列表（排除老师加入教师团队课程）"
      description: "1、云课堂老师端课程管理使用"
      parameters:
        - name: "teacherId"
          in: "path"
          description: "老师id"
          type: "string"
          required: true
        - name: "courseNameOrNo"
          in: "query"
          description: "课程名称或编号"
          type: "string"
        - name: "validCode"
          in: "query"
          description: "验证码teacherId=?&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/CourseInfoResource"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        500:
          description: "服务器异常"

  "/coursemanagement/{courseStructureId}/moved":
    post:
      tags:
        - "CourseManagement"
      summary: "接口-课程资源移动"
      description: "1.云课堂老师端课程管理使用"
      produces:
        - "application/json"
      parameters:
        - name: "courseStructureId"
          type: "string"
          in: "path"
          description: "课程结构Id"
          required: true
        - name: "courseResourceIds"
          type: "string"
          in: "query"
          description: "资源Id,多个以‘，’分割"
          required: true
        - name: "userId"
          type: "string"
          in: "query"
          description: "用户Id"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：courseStructureId=?&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到课程结构信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/coursemanagement/coursescontent":
    get:
      tags:
        - "CourseManagement"
      summary: "接口-查看课程教学内容详情"
      description: "1、云课堂老师端课程管理使用"
      parameters:
        - name: "courseId"
          in: "query"
          description: "课程id"
          type: "string"
          required: true
        - name: "versionId"
          in: "query"
          description: "课程id"
          type: "string"
          required: false
        - name: "type"
          in: "query"
          type: "integer"
          description: "（0-全部 1-只显示课程结构）"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码&signKey=123123(md5加密)"
          type: "string"
          required: true
        - name: "needFilterUserId"
          in: "query"
          type: "string"
          description: "需要过滤的用户ID，即用户ID创建的资源不展示"
          required: false
        - name: "needUserId"
          in: "query"
          type: "string"
          description: "需要的用户ID，即用户ID创建的资源展示"
          required: false
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/CourseStructureVo"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        404:
          description: "未找到资源信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/coursemanagement/courseresource/delete":
    post:
      tags:
        - "CourseManagement"
      summary: "接口-删除课程资源"
      description: "1.云课堂老师端课程管理使用"
      operationId: "deleteCourseManagementCourseResources"
      produces:
        - "application/json"
      parameters:
        - name: "courseId"
          type: "string"
          in: "query"
          description: "课程Id"
          required: true
        - name: "courseResourceIds"
          type: "string"
          in: "query"
          description: "资源Id,多个以‘，’分割"
          required: true
        - name: "userId"
          type: "string"
          in: "query"
          description: "用户Id"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到课程资源信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  "/coursemanagement/courseresource":
    get:
      tags:
        - "CourseManagement"
      summary: "接口-获取课程下结构及资源"
      description: "1.云课堂老师端新增学习材料使用"
      parameters:
        - name: "courseId"
          type: "string"
          in: "query"
          description: "课程id"
          required: true
        - name: "versionId"
          type: "string"
          in: "query"
          description: "课程id"
          required: true
        - name: "userId"
          type: "string"
          in: "query"
          description: "用户Id"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/CourseStructureResource"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到资源信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/coursemanagement/course":
    post:
      tags:
        - "CourseManagement"
      summary: "接口-老师新增课程"
      description: "1.云课堂老师端课程管理使用"
      produces:
        - "application/json"
      parameters:
        - name: "courseModule"
          in: 'body'
          required: true
          description: "新增课程相关信息"
          schema:
            $ref: '#/definitions/CourseModule'
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到课程资源信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/coursemanagement/coursestructure/{id}":
    post:
      tags:
        - "CourseManagement"
      summary: "接口-删除课程结构"
      description: "1.云课堂老师端课程管理使用"
      parameters:
        - name: "id"
          type: "string"
          in: "path"
          description: "课程结构id"
          required: true
        - name: "userId"
          type: "string"
          in: "query"
          description: "用户Id"
          required: true
        - name: "userName"
          type: "string"
          in: "query"
          description: "用户名称"
          required: true
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：id=?&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        404:
          description: "未找到资源信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"
  "/coursemanagement/{courseId}/materialmodule":
    get:
      tags:
        - "CourseManagement"
      summary: "接口-查看课程资料模块状态列表"
      description: "1.云课堂老师端课程管理使用"
      parameters:
        - name: "courseId"
          type: "string"
          in: "path"
          description: "课程id"
          required: true
        - name: "teacherId"
          type: "string"
          in: "query"
          description: "老师id"
          required: true
        - name: "versionId"
          type: "string"
          in: "query"
          description: "版本id"
          required: false
        - name: "validCode"
          type: "string"
          in: "query"
          description: "验证码：courseId=?&signKey=123123(md5加密)"
          required: true
      responses:
        200:
          description: "成功"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/MaterialModule"
        400:
          description: "参数不正确"

          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/coursemanagement/coursestructuresort":
    post:
      tags:
        - "CourseManagement"
      summary: "接口-课程结构排序"
      description: "1、云课堂老师端课程管理使用"
      parameters:
        - name: "userId"
          in: "query"
          description: "用户Id"
          type: "string"
          required: true
        - name: "userName"
          in: "query"
          description: "用户姓名"
          type: "string"
          required: true
        - name: "courseStructureDatas"
          in: 'body'
          schema:
            type: "array"
            items:
              $ref: '#/definitions/CourseStructureData'
          description: "课程结构信息"
          required: true
        - name: "validCode"
          in: "query"
          description: "验证码&signKey=123123(md5加密)"
          type: "string"
          required: true
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: '#/definitions/ErrorResult'
        403:
          description: "验证码错误"
          schema:
            $ref: '#/definitions/ErrorResult'
        404:
          description: "未找到资源信息"
          schema:
            $ref: "#/definitions/ErrorResult"
        409:
          description: "业务数据错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

  "/coursemanagement/{courseId}/materialmoduleinfo":
    get:
      tags:
        - "CourseManagement"
      summary: "接口-查询课程课程介绍、课程大纲、考核办法信息"
      description: "1.云课堂老师端课程管理使用"
      parameters:
        - name: "courseId"
          type: "string"
          in: "path"
          description: "课程id"
          required: true
        - name: "materialModuleType"
