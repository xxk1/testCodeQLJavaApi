swagger: "2.0"
info:
  title: 课程版本信息相关接口接口文档
  version: "1.0"
host: 192.168.1.34:8080
basePath: /v1
schemes:
  - https
  - http
paths:
  "/course/{id}/courseversion":
    get:
      tags:
        - "CourseVersion"
      summary: "获取课程版本信息,如没有版本信息，则生成版本信息"
      description: "1.云课堂老师端-课程建设详情使用"
      operationId: getCourseVersion
      parameters:
        - name: validCode
          in: query
          description: 验证码（id={}&signKey=123123）
          type: string
          required: true
        - name: id
          description: "课程id"
          type: string
          required: true
          in: path
        - name: versionStatus
          type: integer
          description: "版本状态 0：已归档；1：使用中"
          required: false
          in: query
      responses:
        200:
          description: "成功"
          schema:
            type: array
            items:
              $ref: "#/definitions/CourseVersionResource"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"


  "/course/{id}/version":
    post:
      tags:
        - "CourseVersion"
      summary: "课程建设归档，生成版本号"
      description: "1.云课堂老师端-课程建设归档使用"
      operationId: saveCourseVersion
      parameters:
        - name: validCode
          in: query
          description: 验证码（id={}&signKey=123123）
          type: string
          required: true
        - name: id
          description: "课程id"
          type: string
          required: true
          in: path
        - name: "courseVersionResource"
          description: "课程建设归档信息"
          in: body
          required: true
          schema:
            $ref: "#/definitions/CourseVersionResource"
      responses:
        200:
          description: "成功"
        400:
          description: "参数不正确"
          schema:
            $ref: "#/definitions/ErrorResult"
        403:
          description: "验证码错误"
          schema:
            $ref: "#/definitions/ErrorResult"
        500:
          description: "服务器异常"

definitions:

  ErrorResult:
    type: "object"
    properties:
      code:
        type: "string"
        description: "错误码"
      error:
        type: "string"
        description: "错误信息"

  CourseVersionResource:
    type: object
    properties:
      versionId:
        type: string
        description: "版本id"
      versionNumber:
        type: string
        description: "版本号"
      filingTime:
        type: string
        description: "归档时间"
      filingUserId:
        type: string
        description: "归档人id"
      filingUserNo:
        type: string
        description: "归档人工号"
      filingUserName:
        type: string
        description: "归档人姓名"
      remark:
        type: string
        description: "备注"
      versionCompletion:
        type: number
        description: "版本完成度"
      sortTime:
        type: string
        description: "排序时间 归档的取归档时间，未归档取当前时间"